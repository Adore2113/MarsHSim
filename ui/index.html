<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MarsHSim</title>
  <link rel="stylesheet" href="dashboard.css">

  <!---------oribtron font--------->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

  <!--------share tech font-------->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
  
  <!---share tech monospaced font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <div id="dashboard">
    
  <!-------------status------------>
    <div id="status-box" class="panel">
      <p id="status-p"></p>
    </div>

    <!------surface conditions------->
  <div id="surface-box" class="panel">
    <!-- <h2>Surface Conditions:</h2> -->
    <div class="panel-content">
        <p id="surface-p"></p>
    </div>
  </div>

  <!------------alerts------------->
  <div id="alerts-box" class="panel">
    <!-- <h2>Alerts:</h2> -->
    <div class="panel-content">
        <p id="alerts-p"></p>
    </div>
  </div>

  <!-----------atmosphere---------->
  <div id="atm-box" class="panel">
    <h2>Atmosphere:</h2>
    <div class="panel-content">
        <p id="atm-p"></p>
    </div>
  </div>
 
  <!------------oga---------------->
  <div id="oga-box" class="panel">
    <h2>OGA:</h2>
    <div class="panel-content">
        <p id="oga-p"></p>
    </div>
  </div>

  <!-----------sabatier------------>
  <div id="sab-box" class="panel">
    <h2>Sabatier:</h2>
    <div class="panel-content">
        <p id="sab-p"></p>
    </div>
  </div>

  <!-------------water------------->
  <div id="water-box" class="panel">
    <h2>Water:</h2>
    <div class="panel-content">
        <p id="water-p"></p>
    </div>
  </div>

  <!------------power-------------->
  <div id="power-box" class="panel">
    <h2>Power:</h2>
    <div class="panel-content">
        <p id="power-p"></p>
    </div>
  </div>

  <!-------------thermal----------->
  <div id="thermal-box" class="panel">
    <h2>Thermal:</h2>
    <div class="panel-content">
        <p id="thermal-p"></p>
    </div>
  </div>

  <!----------isru water----------->
  <div id="isru-water-box" class="panel">
    <h2>ISRU Pipes:</h2>
    <div class="panel-content">
        <p id="isru-water-p"></p>
    </div>
  </div>

  <!-----------isru atm------------>
  <div id="isru-atm-box" class="panel">
    <h2>ISRU Atmosphere:</h2>
    <div class="panel-content">
        <p id="isru-atm-p"></p>
    </div>
  </div>

  <!-----------greenhouse---------->
  <div id="gh-box" class="panel">
    <h2>Greenhouse:</h2>
    <div class="panel-content">
        <p id="gh-p"></p>
    </div>
  </div>
  
  <script src="dashboard.js"></script>

</html>
