<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MarsHSim</title>
  <link rel="stylesheet" href="dashboard.css">

  <!---------oribtron font--------->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

  <!--------share tech font-------->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
  
  <!---share tech monospaced font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Share+Tech+Mono&display=swap" rel="stylesheet">

</head>

<body>
  <div id="dashboard">

  <!-------top center: status------>
    <div id="status-box" class="panel">
      <p id="status-p"></p>
    </div>

  <!------left top: atmosphere----->
    <div id="atm-box" class="panel">
      <h2>Atmosphere:</h2>
      <p id="atm-p"></p>
    </div>

  <!-----left bottom: sabatier----->
    <div id="sab-box" class="panel">
      <h2>Sabatier:</h2>
      <p id="sab-p"></p>
    </div>

  <!-------center left: water------>
    <div id="water-box" class="panel">
      <h2>Water:</h2>
      <p id="water-p"></p>
    </div>

  <!-----center middle: power------>
    <div id="power-box" class="panel">
      <h2>Power</h2>
      <p id="power-p"></p>
    </div>
  
  <!------center right: thermal---->
    <div id="thermal-box" class="panel">
      <h2>Thermal:</h2>
      <p id="thermal-p"></p>
    </div>

  <!--------right top: isru-------->
    <div id="isru-box" class="panel">
      <h2>ISRU:</h2>
      <p id="isru-p"></p>
    </div>

  <!----right bottom: greenhouse--->
    <div id="gh-box" class="panel">
      <h2>Greenhouse:</h2>
      <p id="gh-p"></p>
    </div>
  
  </div>
  
  <script src="dashboard.js"></script>
</body>

</html>
